services:
  - type: web
    name: ai-prompt-vault-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: DATABASE_URL
        fromDatabase:
          name: promptdb
          property: connectionString

databases:
  - name: promptdb
    databaseName: promptdb
    user: promptuser
